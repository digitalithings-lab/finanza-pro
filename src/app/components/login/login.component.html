<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl border border-gray-100 fade-in">
    <div class="text-center">
      <div class="mx-auto h-12 w-12 bg-gray-900 rounded-xl flex items-center justify-center mb-4">
        <lucide-icon [img]="LogIn" class="text-white w-6 h-6"></lucide-icon>
      </div>
      <h2 class="text-3xl font-bold text-gray-900 tracking-tight">FinanzaPro</h2>
      <p class="mt-2 text-sm text-gray-500">Gestión contable profesional y minimalista</p>
    </div>

    <form class="mt-8 space-y-6" (submit)="onLogin()">
      <div class="space-y-4">
        <div class="relative">
          <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1 block">Usuario</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <lucide-icon [img]="User" class="h-4 w-4 text-gray-400"></lucide-icon>
            </div>
            <input 
              [(ngModel)]="username" 
              name="username" 
              type="text" 
              required 
              class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl leading-5 bg-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition-all duration-200 sm:text-sm"
              placeholder="admin"
            >
          </div>
        </div>

        <div class="relative">
          <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1 block">Contraseña</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <lucide-icon [img]="Lock" class="h-4 w-4 text-gray-400"></lucide-icon>
            </div>
            <input 
              [(ngModel)]="password" 
              name="password" 
              type="password" 
              required 
              class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl leading-5 bg-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition-all duration-200 sm:text-sm"
              placeholder="••••••••"
            >
          </div>
        </div>
      </div>

      <div *ngIf="error" class="text-red-500 text-xs text-center font-medium animate-pulse">
        {{ error }}
      </div>

      <div>
        <button 
          type="submit" 
          class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-semibold rounded-xl text-white bg-gray-900 hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-900 transition-all duration-200 shadow-lg hover:shadow-xl active:scale-[0.98]"
        >
          Iniciar Sesión
        </button>
      </div>
    </form>

    <div class="text-center mt-6">
      <p class="text-xs text-gray-400 italic">Demo: admin / admin</p>
    </div>
  </div>
</div>
