<div class="fade-in space-y-6">
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div>
      <h1 class="text-3xl font-bold text-gray-900">Cartera de Clientes</h1>
      <p class="text-gray-500 mt-1">Gestiona y supervisa la contabilidad de tus clientes.</p>
    </div>
    <button (click)="toggleModal()" class="flex items-center justify-center gap-2 px-5 py-2.5 bg-gray-900 text-white rounded-xl font-semibold text-sm hover:bg-gray-800 transition-all shadow-lg hover:shadow-xl active:scale-95">
      <lucide-icon [img]="Plus" class="w-4 h-4"></lucide-icon>
      Nuevo Cliente
    </button>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
    <!-- Filters -->
    <div class="p-4 border-b border-gray-50 flex flex-col sm:flex-row gap-4 items-center justify-between bg-white">
      <div class="relative w-full sm:w-96">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <lucide-icon [img]="Search" class="h-4 w-4 text-gray-400"></lucide-icon>
        </div>
        <input 
          type="text" 
          [(ngModel)]="searchTerm"
          (ngModelChange)="applyFilter()"
          placeholder="Buscar por nombre o email..." 
          class="block w-full pl-10 pr-3 py-2 border border-gray-100 rounded-xl bg-gray-50/50 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 focus:bg-white transition-all"
        >
      </div>
      <button class="flex items-center gap-2 px-4 py-2 border border-gray-100 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 transition-all">
        <lucide-icon [img]="Filter" class="w-4 h-4"></lucide-icon>
        Filtros
      </button>
    </div>

    <!-- Table -->
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-gray-50/50 border-b border-gray-100">
            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Cliente</th>
            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Tipo</th>
            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Estado</th>
            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider text-right">Acciones</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">
          <tr 
            *ngFor="let client of filteredClients" 
            class="hover:bg-gray-50/80 transition-colors cursor-pointer group"
            [routerLink]="['/dashboard/clients', client.id]"
          >
            <td class="px-6 py-4">
              <div class="flex items-center gap-3">
                <div class="h-10 w-10 rounded-full bg-gray-100 flex items-center justify-center font-bold text-gray-500 border border-gray-100">
                  {{ client.name.charAt(0) }}
                </div>
                <div>
                  <p class="font-bold text-gray-900 group-hover:text-blue-600 transition-colors">{{ client.name }}</p>
                  <p class="text-xs text-gray-400">{{ client.email }}</p>
                </div>
              </div>
            </td>
            <td class="px-6 py-4">
              <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-tight"
                [ngClass]="client.type === 'Empresa' ? 'bg-purple-50 text-purple-600' : 'bg-orange-50 text-orange-600'">
                {{ client.type }}
              </span>
            </td>
            <td class="px-6 py-4">
              <div class="flex items-center gap-1.5">
                <div class="h-1.5 w-1.5 rounded-full" 
                  [ngClass]="client.status === 'Activo' ? 'bg-green-500' : 'bg-yellow-500'">
                </div>
                <span class="text-sm font-medium text-gray-600">{{ client.status }}</span>
              </div>
            </td>
            <td class="px-6 py-4 text-right">
              <div class="flex justify-end items-center gap-2">
                <button (click)="deleteClient($event, client.id)" class="p-2 text-gray-400 hover:text-red-600 rounded-lg hover:bg-red-50 transition-all">
                  <lucide-icon [img]="Trash2" class="w-4 h-4"></lucide-icon>
                </button>
                <button class="p-2 text-gray-400 hover:text-gray-900 rounded-lg hover:bg-gray-100 transition-all">
                  <lucide-icon [img]="MoreHorizontal" class="w-5 h-5"></lucide-icon>
                </button>
                <lucide-icon [img]="ChevronRight" class="w-4 h-4 text-gray-300"></lucide-icon>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  <!-- Modal -->
  <div *ngIf="showModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/40 backdrop-blur-sm animate-in fade-in duration-200">
    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden animate-in zoom-in-95 duration-200">
      <div class="px-8 py-6 border-b border-gray-50 flex items-center justify-between bg-gray-50/50">
        <h3 class="text-xl font-bold text-gray-900">Nuevo Cliente</h3>
        <button (click)="toggleModal()" class="p-2 hover:bg-white rounded-full transition-all text-gray-400 hover:text-gray-900">
          <lucide-icon [img]="X" class="w-5 h-5"></lucide-icon>
        </button>
      </div>
      
      <div class="p-8 space-y-5">
        <div>
          <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Nombre Completo</label>
          <input [(ngModel)]="newClient.name" type="text" placeholder="Ej. Juan Pérez" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 transition-all">
        </div>
        
        <div>
          <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Correo Electrónico</label>
          <input [(ngModel)]="newClient.email" type="email" placeholder="juan@ejemplo.com" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 transition-all">
        </div>

        <div>
          <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Tipo de Cliente</label>
          <div class="grid grid-cols-2 gap-3">
            <button 
              (click)="newClient.type = 'Individual'"
              [class.bg-gray-900]="newClient.type === 'Individual'"
              [class.text-white]="newClient.type === 'Individual'"
              class="py-3 px-4 rounded-xl border border-gray-100 text-sm font-semibold transition-all hover:bg-gray-50"
            >
              Individual
            </button>
            <button 
              (click)="newClient.type = 'Empresa'"
              [class.bg-gray-900]="newClient.type === 'Empresa'"
              [class.text-white]="newClient.type === 'Empresa'"
              class="py-3 px-4 rounded-xl border border-gray-100 text-sm font-semibold transition-all hover:bg-gray-50"
            >
              Empresa
            </button>
          </div>
        </div>
      </div>

      <div class="px-8 py-6 bg-gray-50/50 flex gap-3">
        <button (click)="toggleModal()" class="flex-1 py-3 bg-white border border-gray-200 rounded-xl text-sm font-bold text-gray-600 hover:bg-gray-100 transition-all">
          Cancelar
        </button>
        <button (click)="saveClient()" class="flex-1 py-3 bg-gray-900 text-white rounded-xl text-sm font-bold hover:bg-gray-800 transition-all shadow-lg active:scale-[0.98]">
          Guardar Cliente
        </button>
      </div>
    </div>
  </div>

  <!-- Notification Toast -->
  <div *ngIf="notification" class="fixed bottom-8 right-8 z-[100] px-6 py-4 bg-gray-900 text-white rounded-2xl shadow-2xl flex items-center gap-3 animate-in slide-in-from-bottom-4 duration-300">
    <lucide-icon [img]="ChevronRight" class="w-5 h-5 text-blue-400"></lucide-icon>
    <span class="text-sm font-semibold">{{ notification }}</span>
  </div>
</div>
